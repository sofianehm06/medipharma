# ============================================================
#  Dependabot — Mise à jour automatique des dépendances
#  Réf cours : "Dependabot crée des PR automatiques pour corriger les CVE"
# ============================================================

version: 2

updates:
  # Backend Node.js
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"

  # Frontend React
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions elles-mêmes
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "dependencies"
      - "github-actions"
