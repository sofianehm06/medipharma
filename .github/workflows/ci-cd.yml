# ============================================================
#  MediPharma — Pipeline CI/CD
#  Référence : cours "Pipeline CI CD AIE 2026"
#
#  Jobs :
#    1. test-backend   → Tests Jest (28 tests unitaires)
#    2. build-frontend → Build React de production
#    3. docker-build   → Construction images Docker
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────
  # 1. Tests Backend — Jest
  # ──────────────────────────────────────────────────────────
  test-backend:
    name: Tests Backend (Jest)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE:      medipharma_test
          MYSQL_USER:          testuser
          MYSQL_PASSWORD:      testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Initialiser la base de données de test
        run: |
          mysql -h 127.0.0.1 -u root -ptestpassword < ../database/schema.sql
          mysql -h 127.0.0.1 -u root -ptestpassword -e "GRANT ALL PRIVILEGES ON medipharma.* TO 'testuser'@'%'; FLUSH PRIVILEGES;"

      - name: Vérifier DB testuser
        run: mysql -h 127.0.0.1 -u testuser -ptestpass medipharma -e "SELECT COUNT(*) AS nb_users FROM users; SELECT email FROM users LIMIT 3;"

      - name: Lancer tous les tests avec coverage
        run: npm test -- --coverage --watchAll=false --forceExit --runInBand
        env: &test_env
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_NAME: medipharma
          JWT_SECRET: test_jwt_secret_ci_pipeline_2026
          GEMINI_API_KEY: ""

  # ──────────────────────────────────────────────────────────
  # 2. Build Frontend — React
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install --legacy-peer-deps

      - name: Build React (production)
        run: npm run build
        env:
          REACT_APP_API_URL:  http://localhost:5000/api
          CI:                 false
          NODE_OPTIONS:       --openssl-legacy-provider

      - name: Upload artefact build
        uses: actions/upload-artifact@v4
        with:
          name:            frontend-build
          path:            frontend/build/
          retention-days:  7

  # ──────────────────────────────────────────────────────────
  # 3. Docker Build
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image Docker Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push:    false
          tags:    medipharma/backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build image Docker Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push:    false
          tags:    medipharma/frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
