# ============================================================
#  MediPharma — Mise à jour automatique des dépendances
#  Réf cours : "Dependabot — PR automatiques pour corriger les CVE"
# ============================================================

name: Dependency Update Check

on:
  schedule:
    - cron: '0 8 * * 1'   # Chaque lundi à 8h UTC
  workflow_dispatch:        # Déclenchement manuel possible

jobs:
  audit-backend:
    name: Audit npm — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Audit des vulnérabilités npm
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Rapport des packages obsolètes
        run: npm outdated || true

  audit-frontend:
    name: Audit npm — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Audit des vulnérabilités npm
        run: npm audit --audit-level=high
        continue-on-error: true
