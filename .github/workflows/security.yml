# ============================================================
#  MediPharma — Pipeline DevSecOps
#  Basé sur le cours "Pipline CI CD AIE 2026" (SAST + SCA + DAST)
#
#  Jobs :
#    1. secret-scan   → Détection de secrets exposés (Gitleaks)
#    2. sast-codeql   → Analyse statique du code (CodeQL)
#    3. sca-trivy     → Audit des dépendances vulnérables (Trivy)
#    4. dast-zap      → Tests dynamiques sur l'app live (OWASP ZAP)
#    5. security-report → Rapport consolidé
# ============================================================

name: DevSecOps — Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Scan complet toutes les nuits à 2h00 UTC
    - cron: '0 2 * * *'

permissions:
  contents:      read
  security-events: write   # Requis pour CodeQL & Trivy → GitHub Security tab
  actions:       read

jobs:

  # ── 1. Secret Scanning ─────────────────────────────────────
  # Détecte les clés API, tokens et mots de passe commités par erreur
  # Réf cours : "Twitch incident 2021 — clés API en clair dans le code"
  secret-scan:
    name: 🔐 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Historique complet pour scanner tous les commits

      - name: Gitleaks — Détection de secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── 2. SAST — Static Application Security Testing ─────────
  # CodeQL analyse le code source sans l'exécuter
  # Réf cours : "Analyse de la boîte blanche — mots de passe codés en dur, injections SQL"
  sast-codeql:
    name: 🔍 SAST — CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]  # Couvre Node.js ET React

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Règles personnalisées pour détecter :
          # - Injection SQL
          # - XSS
          # - Authentification cassée
          # - Secrets en dur

      - name: AutoBuild (analyse le code JS/TS)
        uses: github/codeql-action/autobuild@v3

      - name: Exécuter l'analyse CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Les résultats apparaissent dans l'onglet Security → Code scanning

  # ── 3. SCA — Software Composition Analysis ─────────────────
  # Trivy vérifie les dépendances npm contre les CVE connues
  # Réf cours : "SCA — audit des bibliothèques externes (npm)"
  sca-trivy:
    name: 📦 SCA — Trivy Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy — Scan des dépendances Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          vuln-type: library

      - name: Upload résultats Backend → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Trivy — Scan des dépendances Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          vuln-type: library

      - name: Upload résultats Frontend → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Trivy — Scan image Docker Backend (si disponible)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/backend:main
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1   # Échoue le job si CRITICAL trouvé

  # ── 4. DAST — Dynamic Application Security Testing ─────────
  # OWASP ZAP attaque l'application pendant qu'elle tourne
  # Réf cours : "DAST — attaque l'app en envoyant des requêtes malveillantes"
  dast-zap:
    name: 🌐 DAST — OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: []   # Peut tourner en parallèle des autres scans

    services:
      # Démarrer le backend pour le scan dynamique
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE:      medipharma_test
          MYSQL_USER:          testuser
          MYSQL_PASSWORD:      testpass
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer dépendances backend
        run: cd backend && npm ci

      - name: Initialiser la DB de test
        run: mysql -h 127.0.0.1 -u root -ptestpassword medipharma_test < database/schema.sql

      - name: Démarrer le backend en arrière-plan
        run: |
          cd backend
          nohup node src/app.js &
          echo "PID=$!" >> $GITHUB_ENV
          # Attendre que le serveur soit prêt
          for i in {1..20}; do
            curl -sf http://localhost:5000/api/health && break
            sleep 2
          done
        env:
          NODE_ENV:    test
          PORT:        5000
          DB_HOST:     127.0.0.1
          DB_PORT:     3306
          DB_USER:     testuser
          DB_PASSWORD: testpass
          DB_NAME:     medipharma_test
          JWT_SECRET:  test_jwt_secret_dast_scan_2026
          OPENAI_API_KEY: ""

      - name: OWASP ZAP — Baseline Scan (API)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:5000/api
          rules_file_name: .github/zap-rules.tsv
          cmd_options: '-a -j'   # -a: ajax spider, -j: JSON report
          fail_action: warn      # warn = ne bloque pas le pipeline sur les faibles risques
          artifact_name: zap-report

      - name: Upload rapport ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
          retention-days: 30

  # ── 5. Rapport de sécurité consolidé ──────────────────────
  security-report:
    name: 📋 Rapport de sécurité
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-codeql, sca-trivy, dast-zap]
    if: always()

    steps:
      - name: Résumé des scans de sécurité
        run: |
          echo "## 🔒 Rapport DevSecOps — MediPharma" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Outil | Résultat |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | Gitleaks | ${{ needs.secret-scan.result == 'success' && '✅ Aucun secret détecté' || '❌ Secrets détectés !' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | CodeQL | ${{ needs.sast-codeql.result == 'success' && '✅ Aucune vulnérabilité statique' || '⚠️ Voir onglet Security' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SCA | Trivy | ${{ needs.sca-trivy.result == 'success' && '✅ Dépendances sûres' || '⚠️ CVE détectées' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST | OWASP ZAP | ${{ needs.dast-zap.result == 'success' && '✅ Aucune faille dynamique' || '⚠️ Voir rapport ZAP' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 Scan effectué le : $(date '+%d/%m/%Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Commit : ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
